apiVersion: apps/v1
kind: Deployment
metadata:
  name: colordeploy-stable
  namespace: colordeploy
  labels:
    app: colordeploy-canary
    track: stable
spec:
  replicas: 9
  selector:
    matchLabels:
      app: colordeploy-canary
      track: stable
  template:
    metadata:
      labels:
        app: colordeploy-canary
        track: stable
    spec:
      containers:
        - name: app
          image: colordeploy-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DEPLOY_COLOR
              value: "blue"
            - name: APP_VERSION
              value: "v1.0.0"
            - name: REDIS_HOST
              value: "redis-service"
            - name: METRICS_ENABLED
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /live
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
